    <title>Remote</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #212121;
    font-family: system-ui;
  }
  .spacer {
    height: 5vh;
  }
  .centered {
    display: block;
    margin: 0 auto;
    /* Disable long-press callout and text selection but allow scrolling */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    touch-action: auto; /* allows scrolling */
  }
  .footer {
    width: 90vw;
    margin: 0 auto 2.5vh;
    border: 2px solid grey;
    color: white;
    text-align: center;
    padding: 1rem 0;
    box-sizing: border-box;
  }
  .footer a {
    font-weight: bold;
    color: green;
    text-decoration: none;
  }
  .footer a:hover {
    text-decoration: underline;
  }
  .footer .credits {
    font-weight: normal;
    font-size: 0.7em;
    margin-top: 0.3rem;
  }
</style>
